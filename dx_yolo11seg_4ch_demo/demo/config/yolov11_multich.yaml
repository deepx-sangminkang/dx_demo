    max_fps: 25

  - name: "ch3"
    type: "rtsp"
    source: "rtsp://192.168.30.100:8554/stream10"
    enabled: true
    max_fps: 25

  - name: "ch4"
    type: "camera"
    source: 0
    enabled: true
    max_fps: 25
