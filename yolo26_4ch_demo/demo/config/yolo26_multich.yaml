
model: "assets/models/yolo26n-1.dxnn"

# Video decoding mode (global default; can be overridden per channel via `decode:`)
#   auto : use hardware (GStreamer) decoding when the platform/OpenCV support it,
#          otherwise fall back to software decoding (default)
#   hw   : force hardware decoding (still falls back to software if unavailable)
#   sw   : force software decoding (cv2.VideoCapture default backend)
# NOTE: hardware decoding requires an OpenCV build with GStreamer support and the
#       platform decoder plugins (RK3588 mppvideodec / Intel gstreamer1.0-vaapi).
#       See README for details.
decode: "auto"

workers:
  # rockpi profiling showed read~90 but pre=inf=draw~30 (per-stage totals):
  # the inference pipeline is the bottleneck while the NPU itself is starved.
  # Raising preprocess alone just shifts the backpressure to draw, so scale
  # preprocess (CPU-bound letterbox/resize/normalize) and draw (detection
  # post-processing) together. wait (single NPU async result collector with
  # in-flight pipelining) stays at 1.
  preprocess: 2
  wait: 1
  draw: 2

channels:
  - name: "ch1"
    type: "video"
    source: "assets/videos/cctv-city-road.mov"
    enabled: true
    max_fps: 45
    # decode: "auto"   # optional per-channel override (auto/hw/sw)

  - name: "ch2"
    type: "video"
    source: "assets/videos/dron-citry-road.mov"
    enabled: true
    max_fps: 45

  - name: "ch3"
    type: "video"
    source: "assets/videos/carrierbag.mp4"
    enabled: true
    max_fps: 45

  - name: "ch4"
    type: "video"
    source: "assets/videos/dance-group.mov"
    enabled: true
    max_fps: 45

