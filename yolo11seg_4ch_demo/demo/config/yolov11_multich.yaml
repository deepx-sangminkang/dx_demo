
model: "assets/models/yolo11s-seg_optim.dxnn"

# Lock CPU/GPU clocks high at startup so playback is smooth from frame one
# instead of waiting for ondemand governors to ramp up. Best-effort and
# restored on exit.
perf_mode: true

# Keep window hidden for a short warm-up period so visible playback starts
# already stable/smooth. Set 0.0 to show immediately.
startup_warmup_sec: 6.0

workers:
  preprocess: 1
  wait: 1
  postprocess: 2
  draw: 1

channels:
  - name: "ch1"
    type: "video"
    source: "assets/videos/cctv-city-road.mov"
    enabled: true
    max_fps: 25

  - name: "ch2"
    type: "video"
    source: "assets/videos/dron-citry-road.mov"
    enabled: true
    max_fps: 25

  - name: "ch3"
    type: "video"
    source: "assets/videos/carrierbag.mp4"
    enabled: true
    max_fps: 25

  - name: "ch4"
    type: "video"
    source: "assets/videos/dance-group.mov"
    enabled: true
    max_fps: 25

